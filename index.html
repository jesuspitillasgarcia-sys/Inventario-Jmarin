<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Stock - JM</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1e2530; 
            margin: 0; 
            padding: 30px 15px; 
            color: #f0f4f8; 
        }
        
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }
        
        .card { 
            background: #293241; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); 
            position: relative;
        }
        
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3d4a5e;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h2 { 
            margin: 0; 
            font-size: 22px; 
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .logo-img {
            height: 55px; 
            width: auto;
        }
        
        .btn-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .btn-op { 
            flex: 1; 
            padding: 18px; 
            font-size: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center;
            opacity: 0.5;
            transition: all 0.2s ease;
            color: white;
        }
        .btn-entrada { background-color: #2e7d32; }
        .btn-salida { background-color: #c62828; }
        
        /* Estilo cuando el botón está seleccionado */
        .btn-op.active { 
            opacity: 1 !important;
            transform: scale(1.02);
            outline: 3px solid #ffffff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.3); 
        }
        
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #cbd5e1; }
        select, input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 5px; 
            font-size: 16px; 
            background-color: #1e2530;
            color: #ffffff;
            border: 1px solid #475569; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        
        .grid-cantidades { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        
        .btn-submit { 
            background-color: #3b82f6; 
            color: white; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 25px; 
            transition: background 0.2s;
        }
        .btn-submit:hover { background-color: #2563eb; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #3d4a5e; font-size: 15px; }
        th { background-color: #1e2530; color: #94a3b8; font-weight: 600; }
        td { color: #e2e8f0; }
        
        .stock-badge { 
            font-weight: bold; 
            color: #3b82f6; 
            background: rgba(59, 130, 246, 0.15); 
            padding: 6px 12px; 
            border-radius: 6px; 
            display: inline-block; 
        }
        
        .historial-lista { 
            max-height: 220px; 
            overflow-y: auto; 
            background: #1e2530; 
            border: 1px solid #3d4a5e; 
            border-radius: 8px; 
            padding: 15px; 
            font-family: monospace; 
            font-size: 13px; 
        }
        .historial-item { padding: 8px 0; border-bottom: 1px dashed #3d4a5e; color: #cbd5e1; }
        .badge-in { color: #4ade80; font-weight: bold; }
        .badge-out { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-area">
            <h2>📥 REGISTRAR MOVIMIENTO DE STOCK</h2>
            <img src="ico-gjm-1-300x300.png" alt="JM Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
        
        <form id="stockForm" onsubmit="procesarMovimiento(event)">
            <label>1. Operación:</label>
            <div class="btn-group">
                <button type="button" class="btn-op btn-entrada" id="btnEntrada" onclick="setOperacion('ENTRADA')">🟢 ENTRADA (Almacén)</button>
                <button type="button" class="btn-op btn-salida" id="btnSalida" onclick="setOperacion('SALIDA')">🔴 SALIDA (Máquina)</button>
            </div>

            <label for="selectPapel">2. Tipo de Papel y Pegamento:</label>
            <select id="selectPapel" onchange="actualizarMedidasDisponibles()" required>
                <option value="">-- Selecciona el material --</option>
                <option value="PP90 2075">PP90 2075</option>
                <option value="Térmico 2075">Térmico 2075</option>
            </select>

            <label for="selectMedida">3. Medida (Ancho de Corte):</label>
            <select id="selectMedida" required>
                <option value="">-- Selecciona primero el papel --</option>
            </select>

            <label>4. Cantidad:</label>
            <div class="grid-cantidades">
                <div>
                    <label for="pales" style="font-size:13px; color:#94a3b8;">📦 Palés completos:</label>
                    <input type="number" id="pales" min="0" value="0">
                </div>
                <div>
                    <label for="bobinas" style="font-size:13px; color:#94a3b8;">🗞️ Bobinas sueltas:</label>
                    <input type="number" id="bobinas" min="0" value="0">
                </div>
            </div>

            <button type="submit" class="btn-submit">REGISTRAR EN EL SISTEMA</button>
        </form>
    </div>

    <div class="card">
        <h2>📊 VISTA DE CONTROL DE STOCK (Tiempo Real)</h2>
        <table>
            <thead>
                <tr>
                    <th>Tipo de Papel y Pegamento</th>
                    <th>Medida</th>
                    <th>Formato Palé</th>
                    <th>Stock Desglosado</th>
                    <th>Total Bobinas</th>
                </tr>
            </thead>
            <tbody id="tablaStockBody">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h2>⏱️ HISTORIAL DE MOVIMIENTOS (Registro de Auditoría)</h2>
        <div class="historial-lista" id="historialLista">
            </div>
    </div>
</div>

<script>
    // Configuración base de los productos
    const configuracionProductos = {
        "PP90 2075": {
            "333 mm": { bobinasPorPale: 3, stockInicial: 15 }
        },
        "Térmico 2075": {
            "300 mm": { bobinasPorPale: 5, stockInicial: 22 }
        }
    };

    // Cargar datos de memoria local
    let inventario = JSON.parse(localStorage.getItem('inventario_fabrica_jm'));
    if (!inventario) {
        inventario = configuracionProductos;
        localStorage.setItem('inventario_fabrica_jm', JSON.stringify(inventario));
    }

    let historial = JSON.parse(localStorage.getItem('historial_fabrica_jm')) || [];
    let operacionSeleccionada = '';

    // ARREGLADO: Función de botones Entrada/Salida corregida
    function setOperacion(tipo) {
        operacionSeleccionada = tipo;
        document.getElementById('btnEntrada').classList.remove('active');
        document.getElementById('btnSalida').classList.remove('active');
        
        if(tipo === 'ENTRADA') {
            document.getElementById('btnEntrada').classList.add('active');
        } else if(tipo === 'SALIDA') {
            document.getElementById('btnSalida').classList.add('active');
        }
    }

    // ARREGLADO: Filtro de medidas corregido e independiente
    function actualizarMedidasDisponibles() {
        const papelElegido = document.getElementById('selectPapel').value;
        const selectMedida = document.getElementById('selectMedida');
        
        selectMedida.innerHTML = '<option value="">-- Selecciona la medida --</option>';
        
        if (papelElegido && inventario[papelElegido]) {
            for (let medida in inventario[papelElegido]) {
                let opt = document.createElement('option');
                opt.value = medida;
                opt.textContent = `${medida} (Palé de ${inventario[papelElegido][medida].bobinasPorPale} uds)`;
                selectMedida.appendChild(opt);
            }
        }
    }

    function actualizarPantallas() {
        // Renderizar Tabla
        const tbody = document.getElementById('tablaStockBody');
        tbody.innerHTML = '';
        
        for (let papel in inventario) {
            for (let medida in inventario[papel]) {
                let datos = inventario[papel][medida];
                let total = datos.stockInicial;
                let equiv = datos.bobinasPorPale;
                
                let palesEnteros = Math.floor(total / equiv);
                let bobinasSueltas = total % equiv;
                
                tbody.innerHTML += `
                    <tr>
                        <td><b>${papel}</b></td>
                        <td>${medida}</td>
                        <td><small style="color:#94a3b8;">${equiv} bobinas/palé</small></td>
                        <td><span class="stock-badge">${palesEnteros} Palés y ${bobinasSueltas} Bobinas</span></td>
                        <td><b style="color:#ffffff;">${total} uds</b></td>
                    </tr>
                `;
            }
        }

        // Renderizar Historial
        const histDiv = document.getElementById('historialLista');
        if(historial.length === 0) {
            histDiv.innerHTML = '<div style="color:#64748b; text-align:center; padding-top:20px;">No hay movimientos registrados hoy todavía.</div>';
        } else {
            histDiv.innerHTML = '';
            for(let i = historial.length - 1; i >= 0; i--) {
                let item = historial[i];
                let badge = item.tipo === 'ENTRADA' ? '<span class="badge-in">[ENTRADA]</span>' : '<span class="badge-out">[SALIDA]</span>';
                histDiv.innerHTML += `
                    <div class="historial-item">
                        <strong>${item.hora}</strong> - ${badge} ${item.papel} (${item.medida}): ${item.detalle} (Total: ${item.totalMovidis} bobinas).
                    </div>
                `;
            }
        }

        // Guardar cambios en el navegador
        localStorage.setItem('inventario_fabrica_jm', JSON.stringify(inventario));
        localStorage.setItem('historial_fabrica_jm', JSON.stringify(historial));
    }

    function procesarMovimiento(e) {
        e.preventDefault();
        if (!operacionSeleccionada) { alert('Por favor, selecciona primero si es ENTRADA o SALIDA.'); return; }
        
        const papel = document.getElementById('selectPapel').value;
        const medida = document.getElementById('selectMedida').value;
        const palesMover = parseInt(document.getElementById('pales').value) || 0;
        const bobinasMover = parseInt(document.getElementById('bobinas').value) || 0;

        if (!papel || !medida) { alert('Por favor, selecciona el papel y la medida.'); return; }
        if (palesMover === 0 && bobinasMover === 0) { alert('Introduce una cantidad válida.'); return; }

        let datosArticulo = inventario[papel][medida];
        let equiv = datosArticulo.bobinasPorPale;
        let bobinasAMover = (palesMover * equiv) + bobinasMover;

        if (operacionSeleccionada === 'ENTRADA') {
            datosArticulo.stockInicial += bobinasAMover;
        } else {
            if (datosArticulo.stockInicial - bobinasAMover < 0) {
                alert('¡Error! No hay suficiente stock disponible para esta salida.');
                return;
            }
            datosArticulo.stockInicial -= bobinasAMover;
        }

        let ahora = new Date();
        let horaFormateada = ahora.toLocaleDateString() + ' ' + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

        let detalleTexto = `${palesMover} palés y ${bobinasMover} bobinas`;
        historial.push({
            hora: horaFormateada,
            tipo: operacionSeleccionada,
            papel: papel,
            medida: medida,
            detalle: detalleTexto,
            totalMovidis: bobinasAMover
        });

        actualizarPantallas();
        
        // Resetear formulario
        document.getElementById('pales').value = 0;
        document.getElementById('bobinas').value = 0;
    }

    // Arrancar la primera visualización
    actualizarPantallas();
</script>

</body>
</html>
